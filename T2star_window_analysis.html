<!-- ── Beauty Plot interactive analysis panel ───────────────────────────── -->
<div id="bp-fit-panel" style="
    margin: 20px auto 32px auto;
    padding: 16px 18px;
    max-width: 980px;
    border: 1px solid #d4dce8;
    border-radius: 10px;
    background: #f8fafd;
    font-family: 'Source Serif Pro', Charter, Georgia, 'Times New Roman', serif;
    font-size: 13px;
    color: #222;
">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div style="font-weight:600;font-size:15px;color:#1F4E79;">Interactive analysis</div>
    <label style="font-size:12px;color:#555;cursor:pointer;">
      <input type="checkbox" id="bp-fit-enabled" checked />
      enabled
    </label>
  </div>
  <!-- Tab bar: Fits | Window metrics ---------------------------------------- -->
  <div id="bp-tabs" style="display:flex;gap:0;border-bottom:1px solid #d4dce8;margin-bottom:10px;">
    <button type="button" class="bp-tab-btn" data-mode="fit" style="padding:6px 14px;background:#1F4E79;color:white;border:none;border-radius:5px 5px 0 0;cursor:pointer;font-weight:600;font-size:12.5px;">Fits</button>
    <button type="button" class="bp-tab-btn" data-mode="metric" style="padding:6px 14px;background:#e3e8f0;color:#1F4E79;border:none;border-radius:5px 5px 0 0;cursor:pointer;font-weight:500;font-size:12.5px;margin-left:2px;">Window metrics</button>
    <span style="flex:1;"></span>
  </div>

  <!-- ── Fit tab ────────────────────────────────────────────────────────── -->
  <div id="bp-tab-fit">
    <div id="bp-fit-controls" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div style="display:flex;flex-direction:column;gap:3px;flex:2;min-width:200px;">
        <span style="font-size:11px;color:#555;">Function</span>
        <select id="bp-fit-fn" style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;">
          <option value="exp_decay">Exponential decay (A·exp(-t/T) + C)</option>
          <option value="exp_decay_no_offset">Exp decay, no offset (A·exp(-t/T))</option>
          <option value="damped_sine">Damped sine (A·exp(-t/T)·sin(2π·f·t+φ) + C)</option>
          <option value="damped_cosine_linear">Damped cosine + linear baseline (FID) — A·exp(-t/T)·cos(2π·f·t+φ) + a·t + b</option>
          <option value="double_exp_decay">Double exponential decay — A1·exp(-t/T1) + A2·exp(-t/T2) + C</option>
          <option value="linear">Linear (m·t + b)</option>
          <option value="custom">Custom expression…</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px;">
        <span style="font-size:11px;color:#555;">Trace</span>
        <select id="bp-fit-trace" style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;"></select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;width:110px;">
        <span style="font-size:11px;color:#555;">t_start [s]</span>
        <input type="number" id="bp-fit-t0" step="any" placeholder="auto"
               style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;" />
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;width:110px;">
        <span style="font-size:11px;color:#555;">t_end [s]</span>
        <input type="number" id="bp-fit-t1" step="any" placeholder="auto"
               style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;" />
      </div>
      <button id="bp-fit-go" style="padding:7px 16px;background:#1F4E79;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-size:13px;">Run fit</button>
      <button id="bp-fit-clear" style="padding:7px 14px;background:#a0a8b4;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:500;font-size:13px;">Clear fits</button>
      <button id="bp-fit-fill-window" title="Fill t_start/t_end with the current visible x-range" style="padding:7px 12px;background:#fff;color:#1F4E79;border:1px solid #1F4E79;border-radius:5px;cursor:pointer;font-size:12px;">↳ Use visible window</button>
    </div>
    <div id="bp-fit-help" style="margin-top:6px;font-size:11.5px;color:#666;line-height:1.45;font-style:italic;"></div>
    <div id="bp-fit-custom-row" style="display:none;margin-top:10px;">
      <span style="font-size:11px;color:#555;">Custom expression in <code>t</code> with named parameters (initial guesses follow as <code>name=value</code>):</span>
      <input type="text" id="bp-fit-custom-expr" placeholder='e.g. A*Math.exp(-t/T)*Math.cos(2*Math.PI*f*t)+C ; A=1, T=500, f=0.04, C=0'
             style="width:100%;padding:6px 8px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;margin-top:4px;font-family:Consolas,monospace;" />
    </div>
  </div>

  <!-- ── Window-metrics tab ─────────────────────────────────────────────── -->
  <div id="bp-tab-metric" style="display:none;">
    <div id="bp-metric-controls" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div style="display:flex;flex-direction:column;gap:3px;flex:2;min-width:240px;">
        <span style="font-size:11px;color:#555;">Metric</span>
        <select id="bp-metric-fn" style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;">
          <option value="amp_peak_to_peak">Peak-to-peak — max − min</option>
          <option value="amp_peak_to_peak_robust" selected>Peak-to-peak robust — p99 − p1</option>
          <option value="amp_max_around_b0">Max excursion from B₀ — max|y − B₀|</option>
          <option value="amp_max_around_b0_robust">Max excursion robust — p99|y − B₀|</option>
          <option value="amp_median_around_b0">Median excursion — median|y − B₀|</option>
          <option value="amp_rms_around_b0">RMS around B₀ — √mean((y − B₀)²)</option>
          <option value="amp_mean">Mean of y</option>
          <option value="amp_median">Median of y</option>
          <option value="amp_std">Std deviation of y</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px;">
        <span style="font-size:11px;color:#555;">Trace</span>
        <select id="bp-metric-trace" style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;"></select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;width:110px;">
        <span style="font-size:11px;color:#555;">t_start [s]</span>
        <input type="number" id="bp-metric-t0" step="any" placeholder="auto"
               style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;" />
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;width:110px;">
        <span style="font-size:11px;color:#555;">t_end [s]</span>
        <input type="number" id="bp-metric-t1" step="any" placeholder="auto"
               style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;" />
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;width:130px;">
        <span style="font-size:11px;color:#555;">B₀ [nT] (optional)</span>
        <input type="number" id="bp-metric-b0" step="any" placeholder="auto = median"
               style="padding:5px 6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;" />
      </div>
      <button id="bp-metric-go" style="padding:7px 16px;background:#1F4E79;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-size:13px;">Compute</button>
      <button id="bp-metric-clear" style="padding:7px 14px;background:#a0a8b4;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:500;font-size:13px;">Clear results</button>
      <button id="bp-metric-fill-window" title="Fill t_start/t_end with the current visible x-range" style="padding:7px 12px;background:#fff;color:#1F4E79;border:1px solid #1F4E79;border-radius:5px;cursor:pointer;font-size:12px;">↳ Use visible window</button>
    </div>
    <div id="bp-metric-help" style="margin-top:6px;font-size:11.5px;color:#666;line-height:1.45;font-style:italic;"></div>
  </div>

  <div id="bp-fit-result" style="margin-top:12px;font-size:12.5px;color:#222;line-height:1.55;"></div>
</div>

    }
  }
  function pickTrace(gd, idx) {
    if (!gd || !gd.data) return null;
    if (idx < 0 || idx >= gd.data.length) return null;
    var tr = gd.data[idx];
    if (!tr.x || !tr.y) return null;
    return tr;
  }
  function clipToWindow(xs, ys, t0, t1) {
    var X = [], Y = [];
    for (var i = 0; i < xs.length; i++) {
      var tx = +xs[i], ty = +ys[i];
      if (tx >= t0 && tx <= t1 && isFinite(tx) && isFinite(ty)) { X.push(tx); Y.push(ty); }
    }
    return { x: X, y: Y };
  }

  // ---- linear regression ------------------------------------------------
  function fitLinear(xs, ys) {
    var n = xs.length, sx=0, sy=0, sxx=0, sxy=0;
    for (var i = 0; i < n; i++) { sx += xs[i]; sy += ys[i]; sxx += xs[i]*xs[i]; sxy += xs[i]*ys[i]; }
    var det = n * sxx - sx * sx;
    if (Math.abs(det) < 1e-12) return null;
    var m = (n * sxy - sx * sy) / det;
    var b = (sy - m * sx) / n;
    return { m: m, b: b };
  }
  function rsquared(xs, ys, yhat) {
    var n = xs.length, sy = 0;
    for (var i = 0; i < n; i++) sy += ys[i];
    var meanY = sy / n;
    var ssRes = 0, ssTot = 0;
    for (var j = 0; j < n; j++) {
      ssRes += Math.pow(ys[j] - yhat[j], 2);
      ssTot += Math.pow(ys[j] - meanY, 2);
    }
    return ssTot > 0 ? 1 - ssRes / ssTot : NaN;
  }

  // ---- exponential decay (with optional offset) -------------------------
  function fitExpDecayNoOffset(xs, ys) {
    var lxs = [], lys = [];
    for (var i = 0; i < xs.length; i++) if (ys[i] > 0) { lxs.push(xs[i]); lys.push(Math.log(ys[i])); }
    if (lxs.length < 4) return { success:false, message:'need positive y for log-fit' };
    var lin = fitLinear(lxs, lys);
    if (!lin) return { success:false, message:'singular matrix' };
    var A = Math.exp(lin.b);
    var T = -1 / lin.m;
    var yhat = xs.map(function(x){ return A*Math.exp(-x/T); });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { A: A, T: T },
      evaluate: function(x){ return A*Math.exp(-x/T); },
      label: 'A·exp(-t/T)',
      summary: 'A = ' + formatNumber(A) + ',  T = ' + formatNumber(T) + ',  R² = ' + formatNumber(r2, 4),
      r2: r2,
    };
  }
  function fitExpDecayWithOffset(xs, ys) {
    // Coordinate-descent over offset, log-linear over (A, T) at each step.
    var ymin = Math.min.apply(null, ys);
    var ymax = Math.max.apply(null, ys);
    var span = Math.max(Math.abs(ymax - ymin), 1e-12);
    var best = null;
    var offsetCandidates = [];
    for (var k = -10; k <= 10; k++) offsetCandidates.push(ymin - 0.05 * span + k * 0.005 * span);
    function evalSSE(offset) {
      var adjY = ys.map(function(y){ return y - offset; });
      var lxs = [], lys = [];
      for (var i = 0; i < xs.length; i++) if (adjY[i] > 0) { lxs.push(xs[i]); lys.push(Math.log(adjY[i])); }
      if (lxs.length < 4) return null;
      var lin = fitLinear(lxs, lys);
      if (!lin) return null;
      var A = Math.exp(lin.b);
      var T = -1 / lin.m;
      var sse = 0;
      for (var j = 0; j < xs.length; j++) sse += Math.pow(ys[j] - (A*Math.exp(-xs[j]/T) + offset), 2);
      return { offset: offset, A: A, T: T, sse: sse };
    }
    offsetCandidates.forEach(function(o){
      var r = evalSSE(o);
      if (r && (best === null || r.sse < best.sse)) best = r;
    });
    if (!best) return { success:false, message:'failed to converge' };
    // Local refine around the best offset.
    for (var iter = 0; iter < 25; iter++) {
      var step = 0.005 * span * Math.pow(0.85, iter);
      [-step, step].forEach(function(d){
        var r = evalSSE(best.offset + d);
        if (r && r.sse < best.sse) best = r;
      });
    }
    var A = best.A, T = best.T, off = best.offset;
    var yhat = xs.map(function(x){ return A*Math.exp(-x/T) + off; });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { A: A, T: T, offset: off },
      evaluate: function(x){ return A*Math.exp(-x/T) + off; },
      label: 'A·exp(-t/T) + C',
      summary: 'A = ' + formatNumber(A) + ',  T = ' + formatNumber(T) + ',  C = ' + formatNumber(off) + ',  R² = ' + formatNumber(r2, 4),
      r2: r2,
    };
  }

  // ---- damped sine ------------------------------------------------------
  function estimateF0(xs, ys) {
    // Crude periodogram on the centred signal at the dominant frequency.
    var n = xs.length;
    if (n < 16) return null;
    var meanY = 0;
    for (var i = 0; i < n; i++) meanY += ys[i];
    meanY /= n;
    var ymin = Math.min.apply(null, ys), ymax = Math.max.apply(null, ys);
    if (ymax - ymin < 1e-12) return null;
    var dt = (xs[n-1] - xs[0]) / (n - 1);
    var fMax = 0.5 / dt, fMin = 1.0 / (xs[n-1] - xs[0]);
    var nF = 80;
    var bestF = fMin, bestP = -Infinity;
    for (var k = 0; k < nF; k++) {
      var f = fMin + (fMax - fMin) * (k / (nF - 1));
      var sR = 0, sI = 0;
      for (var j = 0; j < n; j++) {
        var phi = 2 * Math.PI * f * xs[j];
        var w = ys[j] - meanY;
        sR += w * Math.cos(phi);
        sI -= w * Math.sin(phi);
      }
      var p = sR*sR + sI*sI;
      if (p > bestP) { bestP = p; bestF = f; }
    }
    return bestF;
  }
  function fitDampedSine(xs, ys) {
    var n = xs.length;
    if (n < 12) return { success:false, message:'need >= 12 points' };
    var f0 = estimateF0(xs, ys);
    if (!f0) return { success:false, message:'frequency estimate failed' };
    // Linear basis: A*sin + B*cos + C  with envelope assumption baked into A,B.
    function fitGivenF(f) {
      var sCos=[], sSin=[];
      for (var i = 0; i < n; i++) {
        var phi = 2 * Math.PI * f * xs[i];
        sCos.push(Math.cos(phi));
        sSin.push(Math.sin(phi));
      }
      var s11=0,s12=0,s13=0,s22=0,s23=0,s33=n,r1=0,r2=0,r3=0;
      for (var j = 0; j < n; j++) {
        s11 += sSin[j]*sSin[j];
        s12 += sSin[j]*sCos[j];
        s13 += sSin[j];
        s22 += sCos[j]*sCos[j];
        s23 += sCos[j];
        r1  += sSin[j]*ys[j];
        r2  += sCos[j]*ys[j];
        r3  += ys[j];
      }
      // Solve 3x3: [s11 s12 s13; s12 s22 s23; s13 s23 s33] [A B C] = [r1 r2 r3]
      var d = s11*(s22*s33 - s23*s23) - s12*(s12*s33 - s23*s13) + s13*(s12*s23 - s22*s13);
      if (Math.abs(d) < 1e-18) return null;
      var A = ((r1)*(s22*s33 - s23*s23) - s12*(r2*s33 - s23*r3) + s13*(r2*s23 - s22*r3)) / d;
      var B = (s11*(r2*s33 - s23*r3) - r1*(s12*s33 - s23*s13) + s13*(s12*r3 - r2*s13)) / d;
      var C = (s11*(s22*r3 - r2*s23) - s12*(s12*r3 - r2*s13) + r1*(s12*s23 - s22*s13)) / d;
      return { A: A, B: B, C: C };
    }
    // Refine f around f0 with golden-section style bracket on residual.
    function sseAtF(f) {
      var p = fitGivenF(f);
      if (!p) return Infinity;
      var sse = 0;
      for (var i = 0; i < n; i++) {
        var phi = 2*Math.PI*f*xs[i];
        var yh = p.A*Math.sin(phi) + p.B*Math.cos(phi) + p.C;
        sse += Math.pow(ys[i]-yh, 2);
      }
      return sse;
    }
    var lo = f0 * 0.5, hi = f0 * 2.0, bestF = f0, bestSSE = sseAtF(f0);
    var nGrid = 60;
    for (var i = 0; i < nGrid; i++) {
      var f = lo + (hi - lo)*(i/(nGrid-1));
      var s = sseAtF(f);
      if (s < bestSSE) { bestSSE = s; bestF = f; }
    }
    // Refine with bisection on derivative (numerical).
    for (var it = 0; it < 30; it++) {
      var df = bestF * 1e-4;
      var sm = sseAtF(bestF - df), sp = sseAtF(bestF + df);
      var grad = (sp - sm) / (2*df);
      var step = -1e-3 * grad / Math.max(Math.abs(grad), 1e-12);
      step = Math.sign(step) * Math.min(Math.abs(step), 0.05 * bestF);
      var trial = bestF + step;
      var sNew = sseAtF(trial);
      if (sNew < bestSSE) { bestSSE = sNew; bestF = trial; } else { break; }
    }
    var lin = fitGivenF(bestF);
    if (!lin) return { success:false, message:'inner solve failed' };
    var amp = Math.sqrt(lin.A*lin.A + lin.B*lin.B);
    var phase = Math.atan2(lin.B, lin.A);
    // T2 from envelope log-fit on |residual| local maxima — quick & dirty:
    // Use absolute residual envelope.
    var detrended = [];
    for (var i = 0; i < n; i++) {
      var phi = 2*Math.PI*bestF*xs[i];
      var oscModel = lin.A*Math.sin(phi) + lin.B*Math.cos(phi);
      var envEst = Math.abs(oscModel) > 1e-12 ? oscModel / amp : 0;
      // approximate envelope from instantaneous magnitude at this sample
      var instAmp = Math.sqrt(Math.pow(ys[i] - lin.C, 2) + 1e-30);
      detrended.push({ x: xs[i], y: instAmp });
    }
    detrended.sort(function(a,b){ return a.x - b.x; });
    var lxs = detrended.map(function(d){return d.x;});
    var lys = detrended.map(function(d){return d.y;});
    var T2 = NaN;
    var lyf = lys.map(function(v){ return v > 0 ? Math.log(v) : NaN; }).filter(isFinite);
    var lxf = lxs.filter(function(_, i){ return isFinite(lys[i] > 0 ? Math.log(lys[i]) : NaN); });
    if (lyf.length >= 8) {
      var lin2 = fitLinear(lxf, lyf);
      if (lin2 && lin2.m < 0) T2 = -1 / lin2.m;
    }
    var yhat = xs.map(function(x){
      var phi = 2*Math.PI*bestF*x;
      return lin.A*Math.sin(phi) + lin.B*Math.cos(phi) + lin.C;
    });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { A: amp, T: T2, frequency: bestF, phase: phase, offset: lin.C },
      evaluate: function(x){
        var phi = 2*Math.PI*bestF*x;
        return lin.A*Math.sin(phi) + lin.B*Math.cos(phi) + lin.C;
      },
      label: 'A·sin(2πft+φ) + C',
      summary: 'A = ' + formatNumber(amp) + ',  T₂* ≈ ' + formatNumber(T2) + ',  f = ' + formatNumber(bestF) + ' Hz,  φ = ' + formatNumber(phase, 3) + ',  C = ' + formatNumber(lin.C) + ',  R² = ' + formatNumber(r2, 4),
      r2: r2,
    };
  }

  // ---- damped cosine with linear baseline (FID preset) ------------------
  // Model: A·exp(-t/T)·cos(2π·f·t + φ) + a·t + b
  // This is the canonical FID-with-baseline-drift fit.  The initial guesses
  // use peak-to-peak / 2 for A, an FFT-based frequency estimate for f,
  // and a simple log-envelope fit for T.
  function fitDampedCosineLinear(xs, ys) {
    var n = xs.length;
    if (n < 16) return { success:false, message:'need >= 16 points' };

    // Amplitude guess from peak-to-peak.
    var ymin = Math.min.apply(null, ys), ymax = Math.max.apply(null, ys);
    var A0 = (ymax - ymin) / 2;
    if (A0 < 1e-30) return { success:false, message:'signal amplitude is zero' };

    // Frequency guess via the same periodogram as damped-sine.
    var f0 = estimateF0(xs, ys);
    if (!f0 || f0 <= 0) f0 = 0.04;

    // Quick T guess: half-range of the data duration (generous fallback).
    var tSpan = xs[n-1] - xs[0];
    var T0 = tSpan > 0 ? tSpan / 2 : 200;

    // Baseline guess: linear fit to a slightly smoothed signal.
    var linBase = fitLinear(xs, ys);
    var a0 = linBase ? linBase.m : 0;
    var meanY = 0; for (var i = 0; i < n; i++) meanY += ys[i]; meanY /= n;
    var b0 = linBase ? linBase.b : meanY;

    // Phase guess: 0 (cosine phase).
    var phi0 = 0;

    // Nelder-Mead parameters: [A, T, f, phi, a, b].
    function model(p, t) {
      var A=p[0], T=p[1], f=p[2], phi=p[3], a=p[4], b=p[5];
      return A * Math.exp(-t/T) * Math.cos(2*Math.PI*f*t + phi) + a*t + b;
    }
    function objective(p) {
      if (p[0] <= 0 || p[1] <= 0 || p[2] <= 0) return 1e30;
      var sse = 0;
      for (var i = 0; i < n; i++) {
        var yh = model(p, xs[i]);
        if (!isFinite(yh)) return 1e30;
        sse += (ys[i] - yh) * (ys[i] - yh);
      }
      return sse;
    }
    var x0 = [A0, T0, f0, phi0, a0, b0];
    var res = nelderMead(objective, x0, { maxIter: 1200, tol: 1e-10 });
    var p = res.x;
    var yhat = xs.map(function(t){ return model(p, t); });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { A: p[0], T: p[1], f: p[2], phi: p[3], a: p[4], b: p[5] },
      evaluate: function(t){ return model(p, t); },
      label: 'A·exp(-t/T)·cos(2πft+φ) + a·t + b',
      summary: (
        'A = ' + formatNumber(p[0]) +
        ',  T = ' + formatNumber(p[1]) +
        ',  f = ' + formatNumber(p[2]) + ' Hz' +
        ',  φ = ' + formatNumber(p[3], 3) +
        ',  a = ' + formatNumber(p[4]) +
        ',  b = ' + formatNumber(p[5]) +
        ',  R² = ' + formatNumber(r2, 4)
      ),
      r2: r2,
    };
  }

  // ---- double exponential decay ------------------------------------------
  // Model: A1·exp(-t/T1) + A2·exp(-t/T2) + C
  // Useful to separate a fast T2* component from a slow bias drift.
  // Initial guesses: split amplitude between two components with T1 ~ tSpan/10
  // (fast) and T2 ~ tSpan (slow); offset C from the data minimum.
  function fitDoubleExpDecay(xs, ys) {
    var n = xs.length;
    if (n < 10) return { success:false, message:'need >= 10 points' };

    var ymin = Math.min.apply(null, ys), ymax = Math.max.apply(null, ys);
    var span = ymax - ymin;
    var tSpan = xs[n-1] - xs[0];
    if (tSpan <= 0) return { success:false, message:'zero time span' };

    // Try to estimate C from the tail of the signal (last 10%).
    var nTail = Math.max(3, Math.round(n * 0.10));
    var tailMean = 0;
    for (var i = n - nTail; i < n; i++) tailMean += ys[i];
    tailMean /= nTail;

    var C0 = tailMean;
    var A1_0 = span * 0.6;
    var A2_0 = span * 0.4;
    var T1_0 = tSpan / 10;   // fast component
    var T2_0 = tSpan;         // slow component

    function model(p, t) {
      var A1=p[0], T1=p[1], A2=p[2], T2=p[3], C=p[4];
      return A1*Math.exp(-t/T1) + A2*Math.exp(-t/T2) + C;
    }
    function objective(p) {
      if (p[1] <= 0 || p[3] <= 0) return 1e30;
      var sse = 0;
      for (var i = 0; i < n; i++) {
        var yh = model(p, xs[i]);
        if (!isFinite(yh)) return 1e30;
        sse += (ys[i] - yh) * (ys[i] - yh);
      }
      return sse;
    }
    var x0 = [A1_0, T1_0, A2_0, T2_0, C0];
    var res = nelderMead(objective, x0, { maxIter: 1000, tol: 1e-10 });
    var p = res.x;
    var yhat = xs.map(function(t){ return model(p, t); });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { A1: p[0], T1: p[1], A2: p[2], T2: p[3], C: p[4] },
      evaluate: function(t){ return model(p, t); },
      label: 'A1·exp(-t/T1) + A2·exp(-t/T2) + C',
      summary: (
        'A1 = ' + formatNumber(p[0]) +
        ',  T1 = ' + formatNumber(p[1]) +
        ',  A2 = ' + formatNumber(p[2]) +
        ',  T2 = ' + formatNumber(p[3]) +
        ',  C = ' + formatNumber(p[4]) +
        ',  R² = ' + formatNumber(r2, 4)
      ),
      r2: r2,
    };
  }

  // ---- linear ------------------------------------------------------------
  function fitLinearWrapper(xs, ys) {
    var lin = fitLinear(xs, ys);
    if (!lin) return { success:false, message:'singular matrix' };
    var yhat = xs.map(function(x){ return lin.m*x + lin.b; });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: { m: lin.m, b: lin.b },
      evaluate: function(x){ return lin.m*x + lin.b; },
      label: 'm·t + b',
      summary: 'm = ' + formatNumber(lin.m) + ',  b = ' + formatNumber(lin.b) + ',  R² = ' + formatNumber(r2, 4),
      r2: r2,
    };
  }

  // ---- custom expression with Nelder-Mead --------------------------------
  function parseCustomExpression(raw) {
    // Format: "<expr> ; name=value, name=value, ..."
    var parts = raw.split(';');
    var expr = parts[0].trim();
    var paramSpec = (parts[1] || '').trim();
    var paramNames = [], paramInit = [];
    if (paramSpec) {
      paramSpec.split(',').forEach(function(p){
        var kv = p.split('=');
        if (kv.length === 2) {
          paramNames.push(kv[0].trim());
          paramInit.push(parseFloat(kv[1]));
        }
      });
    }
    if (!expr || paramNames.length === 0) {
      return { success:false, message:'expression or parameters missing (format: expr ; A=1, T=500, …)' };
    }
    // Build evaluator.
    var argList = ['t'].concat(paramNames);
    var fnBody = 'return (' + expr + ');';
    var fn;
    try { fn = new Function(argList.join(','), fnBody); }
    catch (e) { return { success:false, message:'expression syntax error: ' + e.message }; }
    return { success:true, fn: fn, names: paramNames, initial: paramInit };
  }
  function nelderMead(objective, x0, opts) {
    opts = opts || {};
    var n = x0.length;
    var maxIter = opts.maxIter || 600;
    var tol = opts.tol || 1e-8;
    var simplex = [{ x: x0.slice(), f: objective(x0) }];
    for (var i = 0; i < n; i++) {
      var p = x0.slice();
      var step = Math.max(Math.abs(p[i]) * 0.1, 0.05);
      p[i] += step;
      simplex.push({ x: p, f: objective(p) });
    }
    function reflect(c, x, k) { var r = c.slice(); for (var i = 0; i < n; i++) r[i] = c[i] + k * (c[i] - x[i]); return r; }
    for (var it = 0; it < maxIter; it++) {
      simplex.sort(function(a,b){ return a.f - b.f; });
      var best = simplex[0], worst = simplex[n], second = simplex[n-1];
      if (Math.abs(worst.f - best.f) < tol) break;
      var c = new Array(n).fill(0);
      for (var i = 0; i < n; i++) for (var j = 0; j < n; j++) c[j] += simplex[i].x[j];
      for (var j = 0; j < n; j++) c[j] /= n;
      var xr = reflect(c, worst.x, 1.0);
      var fr = objective(xr);
      if (fr < best.f) {
        var xe = reflect(c, worst.x, 2.0); var fe = objective(xe);
        simplex[n] = (fe < fr) ? { x: xe, f: fe } : { x: xr, f: fr };
      } else if (fr < second.f) {
        simplex[n] = { x: xr, f: fr };
      } else {
        var xc = reflect(c, worst.x, 0.5); var fc = objective(xc);
        if (fc < worst.f) simplex[n] = { x: xc, f: fc };
        else {
          for (var k = 1; k <= n; k++) {
            for (var j = 0; j < n; j++) simplex[k].x[j] = best.x[j] + 0.5 * (simplex[k].x[j] - best.x[j]);
            simplex[k].f = objective(simplex[k].x);
          }
        }
      }
    }
    simplex.sort(function(a,b){ return a.f - b.f; });
    return { x: simplex[0].x, f: simplex[0].f };
  }
  function fitCustomExpression(xs, ys, raw) {
    var parsed = parseCustomExpression(raw);
    if (!parsed.success) return parsed;
    var fn = parsed.fn;
    function objective(p) {
      var sse = 0;
      for (var i = 0; i < xs.length; i++) {
        var args = [xs[i]].concat(p);
        var yh = fn.apply(null, args);
        if (!isFinite(yh)) return 1e30;
        sse += Math.pow(ys[i] - yh, 2);
      }
      return sse;
    }
    var result = nelderMead(objective, parsed.initial, { maxIter: 800, tol: 1e-10 });
    var pHat = {};
    for (var i = 0; i < parsed.names.length; i++) pHat[parsed.names[i]] = result.x[i];
    var yhat = xs.map(function(x){ var args = [x].concat(result.x); return fn.apply(null, args); });
    var r2 = rsquared(xs, ys, yhat);
    return {
      success: true,
      params: pHat,
      evaluate: function(x){ var args = [x].concat(result.x); return fn.apply(null, args); },
      label: 'custom: ' + raw.split(';')[0].trim(),
      summary: parsed.names.map(function(n){ return n + ' = ' + formatNumber(pHat[n]); }).join(',  ') + ',  R² = ' + formatNumber(r2, 4),
      r2: r2,
    };
  }

  // ---- top-level dispatch -----------------------------------------------
  var FIT_FNS = {
    exp_decay: fitExpDecayWithOffset,
    exp_decay_no_offset: fitExpDecayNoOffset,
    damped_sine: fitDampedSine,
    damped_cosine_linear: fitDampedCosineLinear,
    double_exp_decay: fitDoubleExpDecay,
    linear: fitLinearWrapper,
    custom: function(xs, ys) {
      var raw = document.getElementById('bp-fit-custom-expr').value || '';
      return fitCustomExpression(xs, ys, raw);
    },
  };

  // Brief plain-language description of every fit. Shown below the dropdown so
  // a reader of the exported HTML knows what each model does without leaving
  // the file.
  var FIT_HELP = {
    exp_decay: 'Single exponential decay onto a baseline — y = A·exp(-t/T) + C. Use for an envelope that decays toward a non-zero offset.',
    exp_decay_no_offset: 'Pure exponential through zero — y = A·exp(-t/T). Use only when the asymptote is known to be 0.',
    damped_sine: 'Damped sinusoid — y = A·exp(-t/T)·sin(2π·f·t + φ) + C. Frequency seeded by an FFT-style periodogram, then refined by gradient search; T₂* from the residual envelope.',
    damped_cosine_linear: 'FID model — y = A·exp(-t/T)·cos(2π·f·t + φ) + a·t + b. Adds a linear baseline drift, robust against slow detector drift during a T₂* decay.',
    double_exp_decay: 'Two-component decay + offset — y = A1·exp(-t/T1) + A2·exp(-t/T2) + C. Useful when a fast and a slow decay coexist (e.g. signal + bias drift).',
    linear: 'Plain linear regression y = m·t + b. Closed-form least squares.',
    custom: 'Custom JavaScript expression in t with named parameters; fitted via Nelder-Mead from the user-supplied initial guesses.',
  };

  // ---- window-metric helpers -------------------------------------------
  function percentile(arr, p) {
    if (!arr || arr.length === 0) return null;
    var sorted = arr.slice().sort(function(a, b){ return a - b; });
    var idx = (sorted.length - 1) * (p / 100);
    var lo = Math.floor(idx), hi = Math.ceil(idx);
    if (lo === hi) return sorted[lo];
    return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
  }
  function medianOf(arr) {
    if (!arr || arr.length === 0) return null;
    var s = arr.slice().sort(function(a, b){ return a - b; });
    var n = s.length;
    return (n % 2) ? s[(n - 1) / 2] : 0.5 * (s[n / 2 - 1] + s[n / 2]);
  }
  function finiteOnly(arr) {
    var out = [];
    for (var i = 0; i < arr.length; i++) if (isFinite(arr[i])) out.push(+arr[i]);
    return out;
  }

  // Each metric: ``label`` is the Greek/math display, ``help`` is the inline
  // explanation shown below the dropdown, ``compute(xs, ys, b0Or null)``
  // returns one number. ``usesB0`` controls whether the B₀ input is read.
  var METRIC_DEFS = {
    amp_peak_to_peak: {
      label: 'A_pp = max − min',
      help: 'Peak-to-peak amplitude in the window (max − min). Sensitive to spikes — pick the robust variant if outliers are present.',
      usesB0: false,
      compute: function(xs, ys) {
        var f = finiteOnly(ys);
        if (f.length < 2) return null;
        var mn = Infinity, mx = -Infinity;
        for (var i = 0; i < f.length; i++) { if (f[i] < mn) mn = f[i]; if (f[i] > mx) mx = f[i]; }
        return mx - mn;
      },
    },
    amp_peak_to_peak_robust: {
      label: 'A_pp (robust) = p99 − p1',
      help: 'Robust peak-to-peak — discards the top/bottom 1% of samples. Stays stable even with hardware spikes.',
      usesB0: false,
      compute: function(xs, ys) {
        var f = finiteOnly(ys);
        if (f.length < 4) return null;
        return percentile(f, 99) - percentile(f, 1);
      },
    },
    amp_max_around_b0: {
      label: 'max|y − B₀|',
      help: 'Largest excursion of the signal from the holding field B₀. Sensitive to spikes; use the robust variant if needed.',
      usesB0: true,
      compute: function(xs, ys, b0) {
        var f = finiteOnly(ys);
        if (f.length < 2) return null;
        var bb = (b0 !== null && isFinite(b0)) ? b0 : medianOf(f);
        if (bb === null) return null;
        var m = 0;
        for (var i = 0; i < f.length; i++) { var d = Math.abs(f[i] - bb); if (d > m) m = d; }
        return m;
      },
    },
    amp_max_around_b0_robust: {
      label: 'p99|y − B₀|',
      help: 'Robust largest excursion from B₀ — 99th percentile of |y − B₀|. Spike-resistant peak amplitude relative to the holding field.',
      usesB0: true,
      compute: function(xs, ys, b0) {
        var f = finiteOnly(ys);
        if (f.length < 4) return null;
        var bb = (b0 !== null && isFinite(b0)) ? b0 : medianOf(f);
        if (bb === null) return null;
        var dev = f.map(function(v){ return Math.abs(v - bb); });
        return percentile(dev, 99);
      },
    },
    amp_median_around_b0: {
      label: 'median|y − B₀|',
      help: 'Typical absolute deviation from B₀. Very robust — equals the median absolute deviation (MAD) when B₀ ≈ median(y).',
      usesB0: true,
      compute: function(xs, ys, b0) {
        var f = finiteOnly(ys);
        if (f.length < 2) return null;
        var bb = (b0 !== null && isFinite(b0)) ? b0 : medianOf(f);
        if (bb === null) return null;
        return medianOf(f.map(function(v){ return Math.abs(v - bb); }));
      },
    },
    amp_rms_around_b0: {
      label: 'RMS(y − B₀)',
      help: 'Root-mean-square oscillation around B₀. Physical interpretation: the oscillation power; for a clean damped sine RMS = A/√2 over the early window.',
      usesB0: true,
      compute: function(xs, ys, b0) {
        var f = finiteOnly(ys);
        if (f.length < 2) return null;
        var bb = (b0 !== null && isFinite(b0)) ? b0 : medianOf(f);
        if (bb === null) return null;
        var s = 0;
        for (var i = 0; i < f.length; i++) { var d = f[i] - bb; s += d * d; }
        return Math.sqrt(s / f.length);
      },
    },
    amp_mean: {
      label: 'mean(y)',
      help: 'Arithmetic mean of the signal — unbiased estimator of B₀ when the oscillation has zero mean over the window.',
      usesB0: false,
      compute: function(xs, ys) {
        var f = finiteOnly(ys);
        if (f.length === 0) return null;
        var s = 0; for (var i = 0; i < f.length; i++) s += f[i];
        return s / f.length;
      },
    },
    amp_median: {
      label: 'median(y)',
      help: 'Median of the signal — robust estimator of B₀ that stays unbiased even when the window contains few oscillation cycles.',
      usesB0: false,
      compute: function(xs, ys) {
        return medianOf(finiteOnly(ys));
      },
    },
    amp_std: {
      label: 'std(y)',
      help: 'Sample standard deviation. For a pure damped sine in an early window, std ≈ A/√2 — close to the RMS-around-B₀ metric.',
      usesB0: false,
      compute: function(xs, ys) {
        var f = finiteOnly(ys);
        if (f.length < 2) return null;
        var m = 0; for (var i = 0; i < f.length; i++) m += f[i]; m /= f.length;
        var s = 0; for (var i = 0; i < f.length; i++) { var d = f[i] - m; s += d * d; }
        return Math.sqrt(s / (f.length - 1));
      },
    },
  };

  var FIT_COLORS = ['#C15A24','#2A7F7F','#5A4A8A','#3A6E2C','#8B1E1E','#7A6A2F','#4F6D7A','#A05A2C'];

  // ---- panel wiring -----------------------------------------------------
  function populateTraceSelect(gd, selectEl) {
    selectEl.innerHTML = '';
    gd.data.forEach(function(tr, i){
      if (tr.x && tr.y && tr.x.length > 1 && (tr.mode || '').indexOf('lines') >= 0) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.text = (tr.name || ('Trace ' + (i+1)));
        selectEl.appendChild(opt);
      }
    });
  }
  function setActiveTab(mode) {
    document.querySelectorAll('.bp-tab-btn').forEach(function(b){
      var active = (b.dataset.mode === mode);
      b.style.background = active ? '#1F4E79' : '#e3e8f0';
      b.style.color = active ? 'white' : '#1F4E79';
      b.style.fontWeight = active ? '600' : '500';
    });
    document.getElementById('bp-tab-fit').style.display = (mode === 'fit') ? '' : 'none';
    document.getElementById('bp-tab-metric').style.display = (mode === 'metric') ? '' : 'none';
  }
  function updateFitHelp() {
    var key = document.getElementById('bp-fit-fn').value;
    document.getElementById('bp-fit-help').textContent = FIT_HELP[key] || '';
  }
  function updateMetricHelp() {
    var key = document.getElementById('bp-metric-fn').value;
    var def = METRIC_DEFS[key];
    document.getElementById('bp-metric-help').textContent = def ? def.help : '';
    var b0Input = document.getElementById('bp-metric-b0');
    if (def && def.usesB0) { b0Input.disabled = false; b0Input.style.opacity = '1.0'; }
    else { b0Input.disabled = true; b0Input.style.opacity = '0.4'; }
  }
  // Wire UI bits that don't need the Plotly graph to be ready (tab switcher,
  // help-text dropdowns, custom-expression toggle). Splitting this out from
  // ``initData`` makes sure the tabs stay clickable even on slow-loading
  // pages where Plotly's ``gd.data`` isn't populated by the first tick.
  function initUI() {
    document.querySelectorAll('.bp-tab-btn').forEach(function(btn){
      btn.addEventListener('click', function(ev){
        if (ev && ev.preventDefault) ev.preventDefault();
        setActiveTab(this.dataset.mode);
      });
    });
    setActiveTab('fit');

    var fitFn = document.getElementById('bp-fit-fn');
    if (fitFn) {
      fitFn.addEventListener('change', function(){
        document.getElementById('bp-fit-custom-row').style.display = (this.value === 'custom') ? 'block' : 'none';
        updateFitHelp();
      });
      updateFitHelp();
    }

    var metricFn = document.getElementById('bp-metric-fn');
    if (metricFn) {
      metricFn.addEventListener('change', updateMetricHelp);
      updateMetricHelp();
    }
  }

  function initData() {
    var gd = getGraphDiv();
    if (!gd || !gd.data) { setTimeout(initData, 200); return; }

    // Plotly's HTML serialisation packs trace data into typed-array
    // dicts ({dtype, bdata}). Unpack once so downstream code can do
    // ``tr.x.length`` / ``tr.x[i]`` like with a normal array.
    ensureTraceArraysUnpacked(gd);

    // ---- shared: populate trace dropdowns -----------------------------
    var fitTraceSel = document.getElementById('bp-fit-trace');
    var metricTraceSel = document.getElementById('bp-metric-trace');
    populateTraceSelect(gd, fitTraceSel);
    populateTraceSelect(gd, metricTraceSel);
    var firstTrace = pickTrace(gd, parseInt(fitTraceSel.value));
    if (firstTrace) {
      var x0 = formatNumber(firstTrace.x[0]);
      var x1 = formatNumber(firstTrace.x[firstTrace.x.length-1]);
      document.getElementById('bp-fit-t0').placeholder = x0;
      document.getElementById('bp-fit-t1').placeholder = x1;
      document.getElementById('bp-metric-t0').placeholder = x0;
      document.getElementById('bp-metric-t1').placeholder = x1;
    }

    // ---- fit window controls ------------------------------------------
    document.getElementById('bp-fit-fill-window').addEventListener('click', function(){
      var xa = (gd.layout && gd.layout.xaxis && gd.layout.xaxis.range) ? gd.layout.xaxis.range : null;
      if (xa) {
        document.getElementById('bp-fit-t0').value = xa[0];
        document.getElementById('bp-fit-t1').value = xa[1];
      }
    });
    document.getElementById('bp-fit-clear').addEventListener('click', function(){
      var rm = [];
      gd.data.forEach(function(tr, i){ if ((tr.name || '').indexOf('Browser fit') === 0) rm.push(i); });
      if (rm.length) Plotly.deleteTraces(gd, rm.reverse());
      document.getElementById('bp-fit-result').innerHTML = '';
    });

    // ---- metric controls (graph-dependent only — the dropdown change
    //      listener and help-text init already wired up in initUI) -------
    document.getElementById('bp-metric-fill-window').addEventListener('click', function(){
      var xa = (gd.layout && gd.layout.xaxis && gd.layout.xaxis.range) ? gd.layout.xaxis.range : null;
      if (xa) {
        document.getElementById('bp-metric-t0').value = xa[0];
        document.getElementById('bp-metric-t1').value = xa[1];
      }
    });
    document.getElementById('bp-metric-clear').addEventListener('click', function(){
      document.getElementById('bp-fit-result').innerHTML = '';
    });
    document.getElementById('bp-metric-go').addEventListener('click', function(){
      var area = document.getElementById('bp-fit-result');
      if (!document.getElementById('bp-fit-enabled').checked) {
        area.innerHTML = '<span style="color:#888;">Panel disabled — toggle the checkbox to re-enable.</span>';
        return;
      }
      var key = document.getElementById('bp-metric-fn').value;
      var def = METRIC_DEFS[key];
      if (!def) { area.innerHTML = '<span style="color:#9b1c1c;">Unknown metric.</span>'; return; }
      var traceIdx = parseInt(document.getElementById('bp-metric-trace').value);
      var trace = pickTrace(gd, traceIdx);
      if (!trace) { area.innerHTML = '<span style="color:#9b1c1c;">No trace selected.</span>'; return; }
      var t0v = document.getElementById('bp-metric-t0').value;
      var t1v = document.getElementById('bp-metric-t1').value;
      var t0 = (t0v === '' || isNaN(+t0v)) ? +trace.x[0] : +t0v;
      var t1 = (t1v === '' || isNaN(+t1v)) ? +trace.x[trace.x.length-1] : +t1v;
      if (t1 <= t0) { area.innerHTML = '<span style="color:#9b1c1c;">Need t_end > t_start.</span>'; return; }
      var clipped = clipToWindow(trace.x, trace.y, t0, t1);
      if (clipped.x.length < 2) {
        area.innerHTML = '<span style="color:#9b1c1c;">Fewer than 2 points in [' + t0 + ', ' + t1 + '] s.</span>';
        return;
      }
      var b0 = null;
      if (def.usesB0) {
        var b0v = document.getElementById('bp-metric-b0').value;
        b0 = (b0v === '' || isNaN(+b0v)) ? null : +b0v;
      }
      var value;
      try { value = def.compute(clipped.x, clipped.y, b0); }
      catch (e) { area.innerHTML = '<span style="color:#9b1c1c;">Compute failed: ' + e.message + '</span>'; return; }
      if (value === null || !isFinite(value)) {
        area.innerHTML = '<span style="color:#9b1c1c;">Metric undefined for this window (too few finite samples?).</span>';
        return;
      }
      var b0Used = (def.usesB0 && b0 === null) ? medianOf(finiteOnly(clipped.y)) : b0;
      var b0Note = def.usesB0 ? (', B₀ = ' + formatNumber(b0Used, 4) + ' nT' + (b0 === null ? ' (window median)' : '')) : '';
      var swatch = '<span style="display:inline-block;width:10px;height:10px;background:#1F4E79;border-radius:2px;margin-right:6px;border:1px solid rgba(0,0,0,0.18);"></span>';
      var line = swatch + '<b>' + def.label + '</b> on "' + (trace.name || ('Trace ' + (traceIdx+1))) + '" in [' + formatNumber(t0,4) + ', ' + formatNumber(t1,4) + '] s' +
                 ' (n = ' + clipped.x.length + b0Note + '): ' +
                 '<b style="color:#1F4E79;">' + formatNumber(value, 5) + '</b>';
      var existing = area.innerHTML;
      area.innerHTML = existing ? (existing + '<br>' + line) : line;
    });
    document.getElementById('bp-fit-go').addEventListener('click', function(){
      if (!document.getElementById('bp-fit-enabled').checked) {
        document.getElementById('bp-fit-result').innerHTML = '<span style="color:#888;">Panel disabled — toggle the checkbox to re-enable.</span>';
        return;
      }
      var fnKey = document.getElementById('bp-fit-fn').value;
      var traceIdx = parseInt(document.getElementById('bp-fit-trace').value);
      var trace = pickTrace(gd, traceIdx);
      if (!trace) { document.getElementById('bp-fit-result').innerHTML = '<span style="color:#9b1c1c;">No trace selected.</span>'; return; }
      var t0v = document.getElementById('bp-fit-t0').value, t1v = document.getElementById('bp-fit-t1').value;
      var t0 = (t0v === '' || isNaN(+t0v)) ? +trace.x[0] : +t0v;
      var t1 = (t1v === '' || isNaN(+t1v)) ? +trace.x[trace.x.length-1] : +t1v;
      if (t1 <= t0) { document.getElementById('bp-fit-result').innerHTML = '<span style="color:#9b1c1c;">Need t_end > t_start.</span>'; return; }
      var clipped = clipToWindow(trace.x, trace.y, t0, t1);
      if (clipped.x.length < 4) { document.getElementById('bp-fit-result').innerHTML = '<span style="color:#9b1c1c;">Fewer than 4 points in [' + t0 + ', ' + t1 + '] s.</span>'; return; }
      var fitter = FIT_FNS[fnKey];
      if (!fitter) { document.getElementById('bp-fit-result').innerHTML = '<span style="color:#9b1c1c;">Unknown fit function.</span>'; return; }
      var result = fitter(clipped.x, clipped.y);
      if (!result || !result.success) {
        document.getElementById('bp-fit-result').innerHTML = '<span style="color:#9b1c1c;">Fit failed: ' + (result && result.message ? result.message : 'unknown error') + '</span>';
        return;
      }
      var npts = 600;
      var fitX = [], fitY = [];
      for (var i = 0; i < npts; i++) {
        var xv = t0 + (t1 - t0) * (i / (npts - 1));
        fitX.push(xv);
        fitY.push(result.evaluate(xv));
      }
      var existingFits = gd.data.filter(function(t){ return (t.name || '').indexOf('Browser fit') === 0; }).length;
      var color = FIT_COLORS[existingFits % FIT_COLORS.length];
      Plotly.addTraces(gd, {
        x: fitX, y: fitY, mode: 'lines',
        name: 'Browser fit ' + (existingFits + 1) + ' (' + result.label + ')',
        line: { color: color, width: 2.0 },
        hovertemplate: 't=%{x:.4g}<br>%{y:.4g}<extra>%{fullData.name}</extra>',
      });
      var existingResults = document.getElementById('bp-fit-result').innerHTML;
      var swatch = '<span style="display:inline-block;width:10px;height:10px;background:' + color + ';border-radius:2px;margin-right:6px;border:1px solid rgba(0,0,0,0.18);"></span>';
      var newRow = swatch + '<b>Fit ' + (existingFits + 1) + '</b> [' + formatNumber(t0,4) + ', ' + formatNumber(t1,4) + '] s — ' + result.label + ': ' + result.summary;
      document.getElementById('bp-fit-result').innerHTML = (existingResults ? existingResults + '<br>' : '') + newRow;
    });
  }
  // initUI wires up the static panel (tabs, help text, custom-row toggle)
  // and runs as soon as the DOM is parsed — independent of Plotly.
  // initData wires up the controls that depend on the Plotly graph div
  // (trace dropdowns, fit/metric Run buttons) and polls until the graph's
  // ``.data`` array is populated.
  function bootstrap() {
    try { initUI(); } catch (e) { /* never block tab switching on UI errors */ }
    initData();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    setTimeout(bootstrap, 50);
  }
})();
</script>

</body>
</html>
